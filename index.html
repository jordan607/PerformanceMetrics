<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Performance Metrics Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0e11;
    --bg2:      #131619;
    --bg3:      #1a1e23;
    --border:   #242930;
    --border2:  #2e3540;
    --text:     #e2e8f0;
    --muted:    #7a8799;
    --dim:      #4a5568;
    --accent:   #4fc3f7;
    --accent2:  #38b2ac;
    --warn:     #f6ad55;
    --good:     #68d391;
    --bad:      #fc8181;
    --info-bg:  rgba(79,195,247,.08);
    --info-bdr: rgba(79,195,247,.25);
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
    --r:        6px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(12,14,17,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.8)} }
  .header-title { font-size: 13px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .header-title span { color: var(--text); }
  .header-count { font-family: var(--font-mono); font-size: 11px; color: var(--dim); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 61px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .cat-section { border-bottom: 1px solid var(--border); }
  .cat-header {
    padding: 12px 20px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .metric-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  .metric-item:hover { background: var(--bg2); }
  .metric-item.active {
    background: var(--info-bg);
    border-left-color: var(--accent);
  }
  .metric-item.active .mi-name { color: var(--accent); }
  .mi-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .mi-name { font-size: 12.5px; font-weight: 400; color: var(--muted); transition: color .15s; }
  .mi-name:hover { color: var(--text); }

  /* Cat colors */
  .cat-latency     .mi-dot { background: var(--accent); }
  .cat-throughput  .mi-dot { background: var(--accent2); }
  .cat-availability .mi-dot { background: var(--good); }
  .cat-error       .mi-dot { background: var(--bad); }
  .cat-resource    .mi-dot { background: var(--warn); }
  .cat-business    .mi-dot { background: #b794f4; }

  /* ── Main content ── */
  .main { padding: 32px 40px; max-width: 860px; }

  .metric-title {
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -.01em;
    margin-bottom: 4px;
  }
  .metric-aka {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: .04em;
    margin-bottom: 16px;
  }

  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .tag-info  { background: rgba(79,195,247,.12); color: var(--accent); border: 1px solid rgba(79,195,247,.2); }
  .tag-suc   { background: rgba(104,211,145,.12); color: var(--good);  border: 1px solid rgba(104,211,145,.2); }
  .tag-warn  { background: rgba(246,173,85,.12);  color: var(--warn);  border: 1px solid rgba(246,173,85,.2); }
  .tag-err   { background: rgba(252,129,129,.12); color: var(--bad);   border: 1px solid rgba(252,129,129,.2); }
  .tag-purple{ background: rgba(183,148,244,.12); color: #b794f4;      border: 1px solid rgba(183,148,244,.2); }

  .desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 24px;
    font-weight: 300;
  }

  .formula-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--r) var(--r) 0;
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    margin-bottom: 28px;
    white-space: pre-wrap;
    line-height: 1.7;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 40px; }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Benchmarks */
  .bench-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .bench-item:last-child { border-bottom: none; }
  .bench-key { color: var(--muted); }
  .bench-good { color: var(--good); font-family: var(--font-mono); font-size: 11px; }
  .bench-warn { color: var(--warn); font-family: var(--font-mono); font-size: 11px; }
  .bench-bad  { color: var(--bad);  font-family: var(--font-mono); font-size: 11px; }

  /* Calculator */
  .calc-field { margin-bottom: 12px; }
  .calc-field label {
    display: block;
    font-size: 11px;
    color: var(--dim);
    font-family: var(--font-mono);
    letter-spacing: .06em;
    margin-bottom: 5px;
  }
  .calc-field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 11px;
    outline: none;
    transition: border-color .15s;
  }
  .calc-field input:focus { border-color: var(--accent); }

  .calc-result-box {
    margin-top: 14px;
    background: var(--info-bg);
    border: 1px solid var(--info-bdr);
    border-radius: var(--r);
    padding: 14px 16px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .calc-value { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--accent); }
  .calc-unit  { font-family: var(--font-mono); font-size: 12px; color: var(--dim); }

  .no-calc { font-size: 12px; color: var(--dim); line-height: 1.7; }

  /* Divider between metrics */
  .metric-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  /* Responsive */
  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main { padding: 24px 20px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-dot"></div>
    <span class="header-title"><span>Performance Metrics</span> · System Design Reference</span>
  </div>
  <span class="header-count" id="metric-count"></span>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-content"></main>
</div>

<script>
const METRICS = [
  {
    id:'p50', name:'Median latency (p50)', aka:'50th percentile · baseline', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'Baseline',c:'suc'}],
    desc:'The midpoint of all response times — 50% of requests complete faster than this value. Represents the typical user experience. Easy to calculate but hides slow outliers. Never use as your only SLO metric.',
    formula:'Sort all response times ascending\np50 = value at position ⌈N × 0.50⌉',
    calcType:'percentile', pctVal:50,
    benchmarks:[['API endpoint','< 100 ms','good'],['DB query','< 10 ms','good'],['Full page load','< 1 s','good']]
  },
  {
    id:'p90', name:'p90 latency', aka:'90th percentile · common SLO target', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'SLO target',c:'warn'}],
    desc:'90% of requests complete within this time. A common SLO target — it excludes the worst 10% while capturing the vast majority of user experience. Preferred over mean for capacity planning.',
    formula:'Sort all response times ascending\np90 = value at position ⌈N × 0.90⌉',
    calcType:'percentile', pctVal:90,
    benchmarks:[['REST API','< 200 ms','good'],['DB query','< 50 ms','good'],['Checkout flow','< 2 s','good']]
  },
  {
    id:'p95', name:'p95 latency', aka:'95th percentile · SLA target', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'SLA target',c:'warn'}],
    desc:'95% of requests finish within this time. A stricter SLA target, often used for customer-facing commitments. Captures more of the tail than p90 — a better measure of worst-case user experience.',
    formula:'Sort all response times ascending\np95 = value at position ⌈N × 0.95⌉',
    calcType:'percentile', pctVal:95,
    benchmarks:[['Web API','< 500 ms','good'],['Search','< 300 ms','good'],['Payment gateway','< 3 s','good']]
  },
  {
    id:'p99', name:'p99 latency', aka:'99th percentile · tail latency', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'Tail latency',c:'err'}],
    desc:'Only 1% of requests are slower than this. Critical for microservice architectures where slow requests compound (fan-out effect). At 100 RPS, p99 fires every single second — those are real users.',
    formula:'Sort all response times ascending\np99 = value at position ⌈N × 0.99⌉',
    calcType:'percentile', pctVal:99,
    benchmarks:[['Internal API','< 1 s','good'],['DB read','< 100 ms','good'],['Cache miss','< 500 ms','good']]
  },
  {
    id:'p999', name:'p99.9 latency', aka:'Three nines · extreme tail', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'Extreme tail',c:'err'}],
    desc:'1 in 1000 requests is slower than this. At 10K RPS, p99.9 fires 10 times per second — significant user impact. Crucial for high-volume systems. Often caused by GC pauses, cold starts, or lock contention.',
    formula:'Sort all response times ascending\np99.9 = value at position ⌈N × 0.999⌉',
    calcType:'percentile', pctVal:99.9,
    benchmarks:[['High-volume API','< 5 s','good'],['At 10K RPS','10 affected req/s','warn'],['JVM GC pause','< 200 ms','good']]
  },
  {
    id:'avg', name:'Average (mean) latency', aka:'Mean response time · misleading metric', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'Misleading',c:'err'}],
    desc:'Sum of all response times divided by count. Heavily skewed by outliers — a single 10-second timeout drags the mean far above what 99% of users see. Use percentiles for SLOs. Mean is only useful to compute total load.',
    formula:'Mean = Σ(all response times) / N\n\nWarning: one outlier can inflate by 100×',
    calcType:'mean',
    benchmarks:[['Vs p99','Mean often 5–10× lower','warn'],['Use case','Compute total request load','good'],['For SLOs','Use percentiles instead','bad']]
  },
  {
    id:'apdex', name:'Apdex score', aka:'Application Performance Index · user satisfaction', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'UX score',c:'suc'}],
    desc:'Converts raw latency into a 0–1 satisfaction score using a threshold T. Requests under T are "satisfied", under 4T are "tolerating", over 4T are "frustrated". Apdex ≥ 0.94 is excellent. Non-engineers can read it directly.',
    formula:'Apdex = (Satisfied + Tolerating × 0.5) / Total\n\nSatisfied  = requests < T\nTolerating = T ≤ requests < 4T\nFrustrated = requests ≥ 4T',
    calcType:'apdex',
    benchmarks:[['Excellent','0.94 – 1.00','good'],['Good','0.85 – 0.93','good'],['Fair','0.70 – 0.84','warn'],['Poor','< 0.70','bad']]
  },
  {
    id:'ttfb', name:'TTFB', aka:'Time to first byte · web / CDN metric', cat:'latency',
    tags:[{l:'Latency',c:'info'},{l:'Web / CDN',c:'suc'}],
    desc:'Time from the client sending a request to receiving the first byte of the response. Measures server + network overhead before the client can start rendering. A key Web Vitals input — high TTFB kills perceived performance even if total load is fast.',
    formula:'TTFB = DNS lookup + TCP handshake + TLS handshake\n       + Server processing time + Network RTT',
    calcType:null,
    benchmarks:[['Excellent (CDN hit)','< 50 ms','good'],['Good','< 200 ms','good'],['Acceptable','< 500 ms','warn'],['Poor','>1 s — diagnose','bad']]
  },
  {
    id:'tps', name:'Throughput (TPS / RPS)', aka:'Transactions or requests per second', cat:'throughput',
    tags:[{l:'Throughput',c:'suc'},{l:'Capacity',c:'info'}],
    desc:'The number of requests (or transactions) the system processes per second. The primary capacity metric. Measured at the load balancer or application layer. Combine with latency to understand whether you are compute-bound or I/O-bound.',
    formula:'TPS = Total requests / Time window (seconds)\n\nRPS is interchangeable for HTTP traffic',
    calcType:'tps',
    benchmarks:[['Read-heavy API','1K – 100K RPS','good'],['Write-heavy API','100 – 10K TPS','warn'],['PostgreSQL writes','500 – 5K TPS','warn'],['Kafka','1M+ msg/s','good']]
  },
  {
    id:'qps', name:'QPS (queries per second)', aka:'Database query throughput', cat:'throughput',
    tags:[{l:'Throughput',c:'suc'},{l:'DB metric',c:'info'}],
    desc:'Measures database or search query volume per second. Tracked separately from API RPS to identify the DB as a bottleneck. One API request often generates multiple QPS (N+1 problem). Compare QPS to DB connection pool size.',
    formula:'QPS = Total DB queries / Time window (seconds)\n\nMonitor: pg_stat_statements, slow query log',
    calcType:'tps',
    benchmarks:[['PostgreSQL','1K – 10K QPS','good'],['MySQL','2K – 20K QPS','good'],['MongoDB','10K – 100K QPS','good'],['Elasticsearch','500 – 5K QPS','warn']]
  },
  {
    id:'conc', name:'Concurrent connections', aka:'Active connections · Little\'s Law', cat:'throughput',
    tags:[{l:'Throughput',c:'suc'},{l:'Little\'s Law',c:'info'}],
    desc:'Number of active TCP connections or open sessions at any instant. Drives thread pool and connection pool sizing. Key insight: double your response time → double your concurrent connections (Little\'s Law). File descriptor limits (ulimit) can cap this.',
    formula:'Concurrent connections = RPS × Avg response time (s)\n\nLittle\'s Law: L = λ × W\n  L = concurrency, λ = arrival rate, W = service time',
    calcType:'littles',
    benchmarks:[['Nginx','50K+ concurrent','good'],['Node.js','10K – 50K','good'],['DB connection pool','50 – 500 typical','warn'],['Thread-per-request','Capped by OS threads','bad']]
  },
  {
    id:'avail', name:'Availability', aka:'Uptime · SLA nines', cat:'availability',
    tags:[{l:'Availability',c:'suc'},{l:'SLA',c:'warn'}],
    desc:'The fraction of time the system is operational and serving requests correctly. Expressed as "nines". 99.9% sounds great until you realize it allows 8.76 hours of downtime per year — unacceptable for payments or booking systems.',
    formula:'Availability = Uptime / (Uptime + Downtime) × 100%\n\nAvail (series) = A₁ × A₂ × A₃\nAvail (parallel) = 1 − (1−A₁)(1−A₂)',
    calcType:'avail',
    benchmarks:[['99% (two nines)','87.6 hrs/yr down','bad'],['99.9% (three nines)','8.76 hrs/yr down','warn'],['99.99% (four nines)','52.6 min/yr down','good'],['99.999% (five nines)','5.26 min/yr down','good']]
  },
  {
    id:'mttr', name:'MTTR', aka:'Mean time to recovery', cat:'availability',
    tags:[{l:'Availability',c:'suc'},{l:'Incident',c:'err'}],
    desc:'Average time from failure to full system restoration. Drives the availability denominator. Reduce MTTR by improving detection (alerting), runbooks (response), and automation (rollback). MTTR × incident count = total downtime.',
    formula:'MTTR = Total downtime / Number of incidents\n\nAvailability ≈ MTBF / (MTBF + MTTR)',
    calcType:'mttr',
    benchmarks:[['World-class','< 5 min','good'],['Good','< 30 min','good'],['Acceptable','< 2 hrs','warn'],['Poor','> 2 hrs','bad']]
  },
  {
    id:'mtbf', name:'MTBF', aka:'Mean time between failures', cat:'availability',
    tags:[{l:'Availability',c:'suc'},{l:'Reliability',c:'info'}],
    desc:'Average time between successive failures. Higher is better — indicates how long the system runs before the next incident. Improve MTBF through reliability engineering: redundancy, chaos testing, and eliminating single points of failure.',
    formula:'MTBF = Total operational time / Number of failures\n\nAvailability ≈ MTBF / (MTBF + MTTR)',
    calcType:'mtbf',
    benchmarks:[['Consumer app','> 720 hrs (30 days)','good'],['Payment system','> 4380 hrs (6 months)','good'],['Critical infra','> 8760 hrs (1 year)','good']]
  },
  {
    id:'slo', name:'SLO / SLA / Error budget', aka:'Service Level Objective · Agreement · Budget', cat:'availability',
    tags:[{l:'SLA',c:'warn'},{l:'Error budget',c:'purple'}],
    desc:'SLO = internal target (e.g. p99 < 200 ms, error rate < 0.1%). SLA = external contract with financial penalties. Error budget = allowed violations = 100% − SLO%. When the budget burns out, stop shipping features and fix reliability.',
    formula:'Error budget (min/month) = (1 − SLO%) × 43,800\n\nBurn rate = Current error rate / SLO error rate\nBurn rate > 1 → budget depleting faster than allowed',
    calcType:'errbudget',
    benchmarks:[['99.9% SLO','43.8 min/month budget','warn'],['99.99% SLO','4.38 min/month budget','good'],['Burn rate > 1','Stop deploys, fix first','bad'],['Burn rate < 0.5','Budget healthy','good']]
  },
  {
    id:'err', name:'Error rate', aka:'Failure rate · HTTP 5xx rate', cat:'error',
    tags:[{l:'Errors',c:'err'},{l:'Quality',c:'warn'}],
    desc:'Percentage of requests that result in an error (HTTP 5xx, timeout, exception). The primary quality metric. Track separately per service and endpoint — a single bad endpoint can mask a healthy overall average.',
    formula:'Error rate = (Failed requests / Total requests) × 100%\n\nAlso track: timeout rate, circuit-breaker trips',
    calcType:'errrate',
    benchmarks:[['Excellent','< 0.01%','good'],['Good','< 0.1%','good'],['Acceptable','< 1%','warn'],['Poor','>1% — investigate','bad']]
  },
  {
    id:'cpu', name:'CPU utilisation', aka:'CPU usage % · scaling signal', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'Scaling signal',c:'info'}],
    desc:'Percentage of CPU time used vs available. The primary horizontal-scaling trigger. Latency degrades nonlinearly beyond ~70% CPU — queuing theory (M/M/1 queue) shows response time spikes sharply as utilisation approaches 100%.',
    formula:'CPU% = CPU time used / Total CPU time × 100\n\nK8s HPA trigger: avg CPU > 70% → scale out\nUSE method: Utilisation, Saturation, Errors',
    calcType:'pct',
    benchmarks:[['Healthy','< 60%','good'],['Scale-out trigger','> 70%','warn'],['Dangerous','> 85%','bad'],['Theoretical max','100% = requests queue','bad']]
  },
  {
    id:'mem', name:'Memory utilisation', aka:'RAM usage % · heap monitoring', cat:'resource',
    tags:[{l:'Resource',c:'warn'}],
    desc:'Percentage of RAM in use. High memory triggers GC pauses (JVM, Go) or OOM kills. Watch for slow memory creep indicating leaks — a stable plateau is healthy, a steady rise month-over-month is a leak.',
    formula:'Memory% = Used RAM / Total RAM × 100\n\nAlso track: heap usage, GC pause duration, OOM events',
    calcType:'pct',
    benchmarks:[['Healthy','< 70%','good'],['Watch zone','70 – 85%','warn'],['Critical','> 85%','bad'],['OOM threshold','> 95% → pod killed','bad']]
  },
  {
    id:'iops', name:'IOPS', aka:'I/O operations per second · storage metric', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'Storage',c:'info'}],
    desc:'Number of read/write operations the storage handles per second. The bottleneck for write-heavy databases. Watch I/O wait % in CPU stats — high iowait means CPU is idle waiting for disk, a clear IOPS bottleneck signal.',
    formula:'IOPS = Total I/O operations / Time (seconds)\n\nI/O wait % = time CPU waits for I/O / total CPU time\nAWS gp3: 3K–16K IOPS · io2: up to 64K IOPS',
    calcType:'tps',
    benchmarks:[['AWS gp3 SSD','3K – 16K IOPS','good'],['AWS io2 Block','up to 64K IOPS','good'],['HDD','100 – 200 IOPS','bad'],['NVMe local','100K+ IOPS','good']]
  },
  {
    id:'bandwidth', name:'Network bandwidth', aka:'Network I/O · throughput', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'Network',c:'info'}],
    desc:'Volume of data transferred per second. Critical for data-intensive services (video streaming, large payloads, cross-AZ replication traffic). Note: AWS cross-AZ data transfer costs money — measure egress bytes.',
    formula:'Bandwidth (Mbps) = Data transferred (MB) × 8 / Time (s)\n\nAWS cross-AZ: ~1ms RTT · cross-region: 50–150ms RTT',
    calcType:'bandwidth',
    benchmarks:[['EC2 t3.medium','Up to 5 Gbps','good'],['EC2 m5.xlarge','Up to 10 Gbps','good'],['Cross-AZ latency','< 1 ms','good'],['Cross-region','50 – 150 ms','warn']]
  },
  {
    id:'saturation', name:'Saturation', aka:'Queue depth · USE method', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'USE method',c:'info'}],
    desc:'How "full" a resource is — the queue depth of pending work when a resource is at 100% utilisation. Part of the USE method. Non-zero saturation means requests are waiting, not processing. A thread pool queue of 50 is a red flag even if CPU looks fine.',
    formula:'Saturation = Queue depth (requests waiting for a resource)\n\nUSE method per resource:\n  Utilisation + Saturation + Errors → find bottleneck',
    calcType:null,
    benchmarks:[['Thread pool queue','0 = healthy','good'],['DB conn wait','< 5 ms avg','good'],['Queue > 0 sustained','Resource bottleneck','bad'],['Queue growing','Capacity incident','bad']]
  },
  {
    id:'cacheHit', name:'Cache hit ratio', aka:'Cache effectiveness', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'Performance',c:'suc'}],
    desc:'Percentage of requests served from cache without touching the database. The most cost-effective performance lever. A sudden drop signals cache eviction, memory pressure, or a cache cold-start after a deployment.',
    formula:'Hit ratio = Cache hits / (Cache hits + Cache misses) × 100%\n\nRedis INFO stats: keyspace_hits, keyspace_misses',
    calcType:'errrate',
    benchmarks:[['Excellent','> 95%','good'],['Good','85 – 95%','good'],['Investigate','< 80%','warn'],['Cold start','Near 0% on deploy','bad']]
  },
  {
    id:'gcpause', name:'GC pause duration', aka:'Stop-the-world pause · JVM / Go', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'JVM / Go',c:'warn'}],
    desc:'Time the application is frozen while the garbage collector runs. Directly causes p99 latency spikes that look like random outliers. Tune heap size, GC algorithm (G1, ZGC, Shenandoah for JVM), and allocation rate.',
    formula:'GC overhead% = Σ(GC pause durations) / Elapsed time × 100\n\nJVM: -Xlog:gc* · Go: GODEBUG=gctrace=1\nTarget: GC overhead < 5% of total CPU time',
    calcType:null,
    benchmarks:[['G1GC target','< 200 ms per pause','good'],['ZGC / Shenandoah','< 10 ms','good'],['GC overhead','>5% CPU — tune heap','warn'],['Allocation rate','Monitor & reduce','warn']]
  },
  {
    id:'dbrepl', name:'DB replication lag', aka:'Replica delay · read consistency', cat:'resource',
    tags:[{l:'Resource',c:'warn'},{l:'Database',c:'info'}],
    desc:'How far behind the primary the read replica is. A lagging replica serves stale reads. Caused by write bursts, large transactions, or network saturation between primary and replica. Monitor continuously — sudden spikes indicate a problem.',
    formula:'Lag = Primary WAL position − Replica applied position\n\nMySQL:    SHOW REPLICA STATUS → Seconds_Behind_Source\nPostgres: SELECT * FROM pg_stat_replication',
    calcType:null,
    benchmarks:[['Healthy','< 1 s','good'],['Acceptable','< 10 s','warn'],['Stale reads','> 30 s','bad'],['Split-brain risk','> 60 s','bad']]
  },
];

const CATS = [
  { id:'latency',      label:'Latency' },
  { id:'throughput',   label:'Throughput' },
  { id:'availability', label:'Availability' },
  { id:'error',        label:'Error quality' },
  { id:'resource',     label:'Resources' },
];

document.getElementById('metric-count').textContent = METRICS.length + ' metrics';

// ── Sidebar
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = CATS.map(cat => {
    const items = METRICS.filter(m => m.cat === cat.id);
    return `<div class="cat-section cat-${cat.id}">
      <div class="cat-header">${cat.label}</div>
      ${items.map(m => `<div class="metric-item" id="nav-${m.id}" onclick="scrollToMetric('${m.id}')">
        <span class="mi-dot"></span>
        <span class="mi-name">${m.name}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function scrollToMetric(id) {
  const el = document.getElementById('metric-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setActiveNav(id);
}

function setActiveNav(id) {
  document.querySelectorAll('.metric-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + id);
  if (nav) nav.classList.add('active');
}

// ── Calculator builders
function buildCalc(m) {
  const t = m.calcType;
  if (!t) return `<p class="no-calc">This metric is measured directly via APM tooling (Datadog, Prometheus, New Relic, CloudWatch). No formula-based calculator applies — instrument your system and read the emitted metric.</p>`;

  const field = (id, label, placeholder, defVal) =>
    `<div class="calc-field"><label>${label}</label><input id="${id}-${m.id}" type="text" placeholder="${placeholder}" value="${defVal}" oninput="updateCalc('${m.id}')"/></div>`;

  let inputs = '';
  if (t === 'percentile' || t === 'mean') {
    inputs = field('pct', 'Response times (ms, comma-separated)', '45,80,120,200,350,900', '45,80,120,200,350,900');
  } else if (t === 'tps') {
    inputs = field('a', 'Total requests / operations', '10000', '10000') + field('b', 'Time window (seconds)', '60', '60');
  } else if (t === 'avail') {
    inputs = field('a', 'Uptime (minutes)', '43757', '43757') + field('b', 'Downtime (minutes)', '43', '43');
  } else if (t === 'mttr') {
    inputs = field('a', 'Total downtime (minutes)', '120', '120') + field('b', 'Number of incidents', '4', '4');
  } else if (t === 'mtbf') {
    inputs = field('a', 'Operational time (hours)', '720', '720') + field('b', 'Number of failures', '3', '3');
  } else if (t === 'errrate') {
    inputs = field('a', 'Failed / cache misses', '12', '12') + field('b', 'Total requests / lookups', '10000', '10000');
  } else if (t === 'apdex') {
    inputs = field('a', 'Satisfied requests (< T ms)', '800', '800') + field('b', 'Tolerating requests (T – 4T)', '150', '150') + field('c', 'Total requests', '1000', '1000');
  } else if (t === 'pct') {
    inputs = field('a', 'Used (cores / GB)', '3.2', '3.2') + field('b', 'Total (cores / GB)', '8', '8');
  } else if (t === 'bandwidth') {
    inputs = field('a', 'Data transferred (MB)', '500', '500') + field('b', 'Time window (seconds)', '10', '10');
  } else if (t === 'littles') {
    inputs = field('a', 'RPS (requests per second)', '500', '500') + field('b', 'Avg response time (seconds)', '0.2', '0.2');
  } else if (t === 'errbudget') {
    inputs = field('a', 'SLO target (%)', '99.9', '99.9');
  }

  return inputs + `<div class="calc-result-box"><span class="calc-value" id="cv-${m.id}">—</span><span class="calc-unit" id="cu-${m.id}"></span></div>`;
}

function computeResult(m) {
  const g = id => { const el = document.getElementById(id + '-' + m.id); return el ? el.value.trim() : ''; };
  const t = m.calcType;
  if (t === 'percentile' || t === 'mean') {
    const vals = g('pct').split(',').map(s => parseFloat(s)).filter(n => !isNaN(n)).sort((a,b) => a-b);
    if (!vals.length) return {v:'—',u:''};
    if (t === 'mean') return {v:(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1),u:'ms'};
    const idx = Math.ceil((m.pctVal/100)*vals.length)-1;
    return {v:vals[Math.max(0,idx)].toFixed(1),u:'ms'};
  }
  const a = parseFloat(g('a'))||0, b = parseFloat(g('b'))||1, c = parseFloat(g('c'))||1;
  if (t==='tps')       return {v:(a/b).toFixed(1),u:'per second'};
  if (t==='avail')     return {v:((a/(a+b))*100).toFixed(4),u:'% availability'};
  if (t==='mttr')      return {v:(a/b).toFixed(1),u:'min avg per incident'};
  if (t==='mtbf')      return {v:(a/b).toFixed(1),u:'hours between failures'};
  if (t==='errrate')   return {v:((a/b)*100).toFixed(3),u:'%'};
  if (t==='apdex')     return {v:((a+b*0.5)/c).toFixed(3),u:'/ 1.00'};
  if (t==='pct')       return {v:((a/b)*100).toFixed(1),u:'%'};
  if (t==='bandwidth') return {v:((a*8)/b).toFixed(1),u:'Mbps'};
  if (t==='littles')   return {v:Math.round(a*b).toString(),u:'concurrent connections'};
  if (t==='errbudget') return {v:((1-a/100)*43800).toFixed(1),u:'min / month error budget'};
  return {v:'—',u:''};
}

function updateCalc(id) {
  const m = METRICS.find(x=>x.id===id);
  if (!m || !m.calcType) return;
  const r = computeResult(m);
  const cv = document.getElementById('cv-'+id);
  const cu = document.getElementById('cu-'+id);
  if (cv) cv.textContent = r.v;
  if (cu) cu.textContent = r.u;
}

// ── Main content
function buildMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = METRICS.map((m, i) => {
    const tags = m.tags.map(t => `<span class="tag tag-${t.c}">${t.l}</span>`).join('');
    const benches = m.benchmarks.map(b =>
      `<div class="bench-item"><span class="bench-key">${b[0]}</span><span class="bench-${b[2]}">${b[1]}</span></div>`
    ).join('');
    const divider = i < METRICS.length - 1 ? '<hr class="metric-divider"/>' : '';

    return `<section id="metric-${m.id}">
      <div class="metric-title">${m.name}</div>
      <div class="metric-aka">${m.aka}</div>
      <div class="tag-row">${tags}</div>
      <p class="desc">${m.desc}</p>
      <div class="formula-box">${m.formula}</div>
      <div class="two-col">
        <div>
          <div class="panel-label">Industry benchmarks</div>
          ${benches}
        </div>
        <div>
          <div class="panel-label">Calculator</div>
          ${buildCalc(m)}
        </div>
      </div>
    </section>${divider}`;
  }).join('');

  // Trigger initial calculation for all
  METRICS.forEach(m => { if (m.calcType) updateCalc(m.id); });
}

// ── Scroll observer for nav highlighting
function initScrollSpy() {
  const sections = document.querySelectorAll('section[id^="metric-"]');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('metric-', '');
        setActiveNav(id);
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  sections.forEach(s => observer.observe(s));
}

buildSidebar();
buildMain();
initScrollSpy();
setActiveNav('p50');
</script>
</body>
