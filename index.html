
<h2 class="sr-only">Performance metrics reference and calculator for distributed systems</h2>
<style>
  .pm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .pm-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; cursor: pointer; border: 1.5px solid transparent; transition: border-color .15s; }
  .pm-card:hover { border-color: var(--color-border-secondary); }
  .pm-card.active { border-color: var(--color-border-info); background: var(--color-background-info); }
  .pm-card.active .pm-label { color: var(--color-text-info); }
  .pm-card.active .pm-cat { color: var(--color-text-info); opacity: .7; }
  .pm-label { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; }
  .pm-cat { font-size: 11px; color: var(--color-text-tertiary); margin: 0; text-transform: uppercase; letter-spacing: .04em; }
  .detail-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 20px 24px; margin-bottom: 24px; }
  .detail-name { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .detail-aka { font-size: 12px; color: var(--color-text-tertiary); margin: 0 0 14px; }
  .detail-desc { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; margin: 0 0 16px; }
  .formula-box { background: var(--color-background-secondary); border-left: 3px solid var(--color-border-info); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 10px 14px; font-size: 13px; font-family: var(--font-mono); color: var(--color-text-primary); margin: 0 0 16px; white-space: pre-wrap; }
  .calc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .calc-label { font-size: 13px; color: var(--color-text-secondary); min-width: 130px; }
  .calc-input { width: 90px; }
  .calc-result { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 16px; font-size: 22px; font-weight: 500; color: var(--color-text-primary); display: inline-block; margin-top: 4px; }
  .result-unit { font-size: 13px; color: var(--color-text-secondary); margin-left: 4px; }
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .tag-warn { background: var(--color-background-warning); color: var(--color-text-warning); }
  .tag-info { background: var(--color-background-info); color: var(--color-text-info); }
  .tag-suc  { background: var(--color-background-success); color: var(--color-text-success); }
  .tag-err  { background: var(--color-background-danger); color: var(--color-text-danger); }
  .bench-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .bench-row:last-child { border: none; }
  .bench-good { color: var(--color-text-success); font-weight: 500; }
  .bench-warn { color: var(--color-text-warning); font-weight: 500; }
  .bench-bad  { color: var(--color-text-danger); font-weight: 500; }
  .section-title { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 8px; }
  select { font-size: 13px; padding: 6px 10px; }
</style>

<div style="margin-bottom:16px">
  <p class="section-title">Filter by category</p>
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px" id="cat-filters">
    <button onclick="filterCat('all')" class="active" id="f-all" style="font-size:12px;padding:4px 12px;border-radius:20px">All</button>
    <button onclick="filterCat('latency')" id="f-latency" style="font-size:12px;padding:4px 12px;border-radius:20px">Latency</button>
    <button onclick="filterCat('throughput')" id="f-throughput" style="font-size:12px;padding:4px 12px;border-radius:20px">Throughput</button>
    <button onclick="filterCat('availability')" id="f-availability" style="font-size:12px;padding:4px 12px;border-radius:20px">Availability</button>
    <button onclick="filterCat('error')" id="f-error" style="font-size:12px;padding:4px 12px;border-radius:20px">Errors</button>
    <button onclick="filterCat('resource')" id="f-resource" style="font-size:12px;padding:4px 12px;border-radius:20px">Resources</button>

</div>

<div class="detail-panel" id="detail-panel"></div>

<script>

let activeCat = 'all';
let activeId = METRICS[1].id;

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('#cat-filters button').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + cat).classList.add('active');
  renderCards();
}

function renderCards() {
  const c = document.getElementById('cards-container');
  const filtered = activeCat === 'all' ? METRICS : METRICS.filter(m => m.cat === activeCat);
  c.innerHTML = filtered.map(m => `
    <div class="pm-card${m.id === activeId ? ' active' : ''}" onclick="selectMetric('${m.id}')">
      <p class="pm-label">${m.name}</p>
      <p class="pm-cat">${m.cat}</p>
    </div>
  `).join('');
}

function selectMetric(id) {
  activeId = id;
  renderCards();
  renderDetail();
}

function calcResult(m) {
  const t = m.calcType;
  if (t === 'percentile') {
    const raw = document.getElementById('pct-input').value.trim();
    const vals = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n)).sort((a,b) => a-b);
    if (!vals.length) return {val:'—', unit:''};
    const idx = Math.ceil((m.pctVal / 100) * vals.length) - 1;
    return {val: vals[Math.max(0, idx)].toFixed(1), unit:'ms'};
  }
  if (t === 'mean') {
    const raw = document.getElementById('pct-input').value.trim();
    const vals = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
    if (!vals.length) return {val:'—', unit:''};
    return {val: (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1), unit:'ms'};
  }
  if (t === 'tps') {
    const req = parseFloat(document.getElementById('calc-a').value) || 0;
    const secs = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: (req / secs).toFixed(1), unit:'per second'};
  }
  if (t === 'avail') {
    const up = parseFloat(document.getElementById('calc-a').value) || 0;
    const down = parseFloat(document.getElementById('calc-b').value) || 0;
    const pct = ((up / (up + down)) * 100);
    return {val: pct.toFixed(4), unit:'%'};
  }
  if (t === 'mttr') {
    const total = parseFloat(document.getElementById('calc-a').value) || 0;
    const count = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: (total / count).toFixed(1), unit:'min avg per incident'};
  }
  if (t === 'mtbf') {
    const opTime = parseFloat(document.getElementById('calc-a').value) || 0;
    const fails = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: (opTime / fails).toFixed(1), unit:'hours between failures'};
  }
  if (t === 'errrate') {
    const fail = parseFloat(document.getElementById('calc-a').value) || 0;
    const total = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: ((fail / total) * 100).toFixed(3), unit:'%'};
  }
  if (t === 'apdex') {
    const sat = parseFloat(document.getElementById('calc-a').value) || 0;
    const tol = parseFloat(document.getElementById('calc-b').value) || 0;
    const total = parseFloat(document.getElementById('calc-c').value) || 1;
    return {val: ((sat + tol / 2) / total).toFixed(3), unit:'/ 1.0'};
  }
  if (t === 'pct') {
    const used = parseFloat(document.getElementById('calc-a').value) || 0;
    const total = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: ((used / total) * 100).toFixed(1), unit:'%'};
  }
  if (t === 'bandwidth') {
    const mb = parseFloat(document.getElementById('calc-a').value) || 0;
    const secs = parseFloat(document.getElementById('calc-b').value) || 1;
    return {val: ((mb * 8) / secs).toFixed(1), unit:'Mbps'};
  }
  if (t === 'littles') {
    const rps = parseFloat(document.getElementById('calc-a').value) || 0;
    const rt = parseFloat(document.getElementById('calc-b').value) || 0;
    return {val: Math.round(rps * rt).toString(), unit:'concurrent connections'};
  }
  if (t === 'errbudget') {
    const slo = parseFloat(document.getElementById('calc-a').value) || 99.9;
    return {val: ((1 - slo/100) * 43800).toFixed(1), unit:'min / month budget'};
  }
  return {val:'—', unit:''};
}

function buildCalc(m) {
  const t = m.calcType;
  if (!t) return '<p style="font-size:13px;color:var(--color-text-tertiary);margin:0">No calculator for this metric — measured directly via APM tooling (Datadog, Prometheus, New Relic).</p>';

  const inputBlock = (id, label, placeholder, defaultVal) =>
    `<div class="calc-row"><span class="calc-label">${label}</span><input class="calc-input" id="${id}" type="text" placeholder="${placeholder}" value="${defaultVal}" oninput="updateResult('${m.id}')"></div>`;

  let inputs = '';
  if (t === 'percentile' || t === 'mean') {
    inputs = inputBlock('pct-input', 'Response times (ms, csv)', '45,80,120,200,350,900', '45,80,120,200,350,900');
  } else if (t === 'tps') {
    inputs = inputBlock('calc-a','Total requests','10000','10000') + inputBlock('calc-b','Time window (sec)','60','60');
  } else if (t === 'avail') {
    inputs = inputBlock('calc-a','Uptime (minutes)','43757','43757') + inputBlock('calc-b','Downtime (minutes)','43','43');
  } else if (t === 'mttr') {
    inputs = inputBlock('calc-a','Total downtime (min)','120','120') + inputBlock('calc-b','Number of incidents','4','4');
  } else if (t === 'mtbf') {
    inputs = inputBlock('calc-a','Operational time (hrs)','720','720') + inputBlock('calc-b','Number of failures','3','3');
  } else if (t === 'errrate') {
    inputs = inputBlock('calc-a','Failed / misses','12','12') + inputBlock('calc-b','Total requests / lookups','10000','10000');
  } else if (t === 'apdex') {
    inputs = inputBlock('calc-a','Satisfied (< T)','800','800') + inputBlock('calc-b','Tolerating (T–4T)','150','150') + inputBlock('calc-c','Total requests','1000','1000');
  } else if (t === 'pct') {
    inputs = inputBlock('calc-a','Used','3.2','3.2') + inputBlock('calc-b','Total (same unit)','8','8');
  } else if (t === 'bandwidth') {
    inputs = inputBlock('calc-a','Data transferred (MB)','500','500') + inputBlock('calc-b','Time (seconds)','10','10');
  } else if (t === 'littles') {
    inputs = inputBlock('calc-a','RPS','500','500') + inputBlock('calc-b','Avg response time (s)','0.2','0.2');
  } else if (t === 'errbudget') {
    inputs = inputBlock('calc-a','SLO target (%)','99.9','99.9');
  }

  return `<div style="margin-top:4px">
    <p class="section-title" style="margin-bottom:10px">Calculator</p>
    ${inputs}
    <div class="calc-result" id="calc-out-${m.id}">—<span class="result-unit" id="calc-unit-${m.id}"></span></div>
  </div>`;
}

function updateResult(id) {
  const m = METRICS.find(x => x.id === id);
  if (!m) return;
  const r = calcResult(m);
  const el = document.getElementById('calc-out-' + id);
  const eu = document.getElementById('calc-unit-' + id);
  if (el) el.childNodes[0].textContent = r.val;
  if (eu) eu.textContent = ' ' + r.unit;
}

function renderDetail() {
  const m = METRICS.find(x => x.id === activeId);
  if (!m) return;
  const tags = m.tags.map(t => `<span class="tag tag-${t.c}">${t.l}</span>`).join('');
  const benches = m.benchmarks.map(b =>
    `<div class="bench-row"><span>${b[0]}</span><span class="bench-${b[2]}">${b[1]}</span></div>`
  ).join('');

  document.getElementById('detail-panel').innerHTML = `
    <p class="detail-name">${m.name}</p>
    <p class="detail-aka">${m.aka}</p>
    <div class="tag-row">${tags}</div>
    <p class="detail-desc">${m.desc}</p>
    <div class="formula-box">${m.formula}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
      <div>
        <p class="section-title">Industry benchmarks</p>
        ${benches}
      </div>
      <div id="calc-area">${buildCalc(m)}</div>
    </div>
  `;
  const r = calcResult(m);
  const el = document.getElementById('calc-out-' + m.id);
  const eu = document.getElementById('calc-unit-' + m.id);
  if (el && r.val !== '—') { el.childNodes[0].textContent = r.val; if(eu) eu.textContent = ' ' + r.unit; }
}

renderCards();
renderDetail();
</script>
